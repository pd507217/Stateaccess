<!DOCTYPE html>

<html lang="en"><head>
<meta charset="UTF-8">
<title>Review Document</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f5f5f5;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        padding: 30px;
        text-align: center;
        border-radius: 6px;
    }

    .logo {
        text-align: left;
        margin-bottom: 20px;
    }

    .logo img {
        height: 28px;
    }

    .app {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
    }

    .app img {
        height: 32px;
    }

    h1 {
        font-size: 28px;
        color: #333;
        margin-bottom: 20px;
    }

    p {
        color: #555;
        font-size: 16px;
        line-height: 1.5;
    }

    .button {
        margin: 25px 0;
    }

    .button a {
        background-color: #d32f2f;
        color: #fff;
        padding: 12px 25px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 5px;
        display: inline-block;
    }

    .illustration {
        margin: 25px 0;
    }

    .illustration img {
        max-width: 100%;
        height: auto;
    }

    .footer {
        font-size: 14px;
        color: #777;
        margin-top: 20px;
    }
</style>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body>

<div class="container">

    <div class="logo">
<img width="102" style="border-color: rgb(0, 0, 0); width: 277px; height: 60px;" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Adobe_Corporate_logo.svg">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    </div>

    <div class="app">
        <img alt="PDF Icon" src="https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg">
        <span><strong>Adobe Acrobat Reader</strong></span>
    </div>

    <h1>The world&#8217;s most trusted<br>free PDF viewer</h1>

    <p>
        Please click the &#8220;Download and Review Document&#8221; link below to begin the eSignature process.
    </p>

    <div class="button">
        <a href="#">Download and Review Document</a>
    </div>

    <div class="illustration">
<img width="598" height="267" style="border-color: rgb(0, 0, 0); width: 404px;" src="https://miro.medium.com/v2/resize:fit:1400/format:webp/1*jqa03XAslkb_jQN7WB9w4w.jpeg">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    </div>

    <div class="footer">
        If link is broken or expired, Adobe will send a fresh link to your email address
    </div>

</div>


</body></html>
